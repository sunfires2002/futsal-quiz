<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フットサル ルールクイズ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;
  --surface:#161921;
  --surface2:#1e2230;
  --border:#2a2f3e;
  --text:#e8eaf0;
  --text2:#8892a4;
  --accent:#00c2ff;
  --accent2:#7b5cff;
  --green:#22c55e;
  --red:#ef4444;
  --orange:#f59e0b;
  --radius:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif}
.wrap{max-width:540px;margin:0 auto;padding:1.25rem 1rem 3rem}

/* header */
.site-header{display:flex;align-items:center;gap:10px;margin-bottom:2rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border)}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:15px;font-weight:700;letter-spacing:.08em;color:var(--text)}
.logo-sub{font-size:11px;color:var(--text2);letter-spacing:.05em;margin-top:1px}

/* tabs */
.tab-bar{display:flex;background:var(--surface);border-radius:var(--radius);padding:4px;gap:4px;margin-bottom:1.5rem}
.tab{flex:1;padding:8px;border:none;background:none;color:var(--text2);font-size:13px;border-radius:7px;cursor:pointer;font-family:inherit;transition:all .2s}
.tab.active{background:var(--surface2);color:var(--text);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.4)}

/* level filter */
.level-row{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.level-btn{flex:1;min-width:56px;padding:7px 6px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;text-align:center}
.level-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,194,255,.08)}

/* progress */
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.progress-bar{flex:1;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s ease}
.progress-label{font-size:12px;color:var(--text2);white-space:nowrap}

/* question card */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.q-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.q-counter{font-size:12px;color:var(--text2)}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.04em}
.badge-easy{background:rgba(34,197,94,.15);color:var(--green)}
.badge-mid{background:rgba(245,158,11,.15);color:var(--orange)}
.badge-hard{background:rgba(239,68,68,.15);color:var(--red)}
.q-text{font-size:15px;font-weight:600;line-height:1.6;color:var(--text)}

/* choices */
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.choice-btn{padding:12px 14px;border:1px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);font-size:14px;text-align:left;cursor:pointer;font-family:inherit;line-height:1.4;transition:all .15s}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(0,194,255,.06)}
.choice-btn.correct{border-color:var(--green);background:rgba(34,197,94,.12);color:#86efac}
.choice-btn.wrong{border-color:var(--red);background:rgba(239,68,68,.12);color:#fca5a5}

/* explanation */
.explanation{padding:12px 14px;border-radius:10px;background:rgba(123,92,255,.1);border-left:3px solid var(--accent2);font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:1rem;display:none}
.explanation.show{display:block}

/* next btn */
.next-btn{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;letter-spacing:.04em;display:none;transition:all .2s}
.next-btn.show{display:block}
.next-btn:hover{border-color:var(--accent);color:var(--accent)}

/* result */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem 1.5rem;text-align:center}
.result-score{font-size:52px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.25rem}
.result-total{font-size:14px;color:var(--text2);margin-bottom:1.5rem}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
.stat{background:var(--surface2);border-radius:10px;padding:.875rem;text-align:center}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700}
.result-msg{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:1.5rem}
.result-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.result-btn{padding:10px 20px;border:1px solid var(--border);border-radius:9px;background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s}
.result-btn.primary{border-color:var(--accent);color:var(--accent);background:rgba(0,194,255,.08)}
.result-btn:hover{opacity:.8}

/* admin */
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.admin-count{font-size:13px;color:var(--text2)}
.add-btn{padding:8px 14px;border:1px solid var(--accent);border-radius:8px;background:rgba(0,194,255,.08);color:var(--accent);font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.filter-row{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.filter-chip{padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
.filter-chip.active{border-color:var(--accent);color:var(--accent)}
.q-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
.q-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.q-item-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.q-item-text{font-size:13px;font-weight:500;color:var(--text);flex:1;line-height:1.5}
.q-item-actions{display:flex;gap:6px;flex-shrink:0}
.edit-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit}
.del-btn{padding:4px 10px;border:1px solid rgba(239,68,68,.4);border-radius:6px;background:rgba(239,68,68,.08);color:var(--red);font-size:12px;cursor:pointer;font-family:inherit}
.q-item-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}

/* form */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.form-title{font-size:14px;font-weight:700;margin-bottom:1rem;color:var(--text)}
.form-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;margin-bottom:12px;outline:none;transition:border .2s}
.form-input:focus{border-color:var(--accent)}
textarea.form-input{resize:vertical;min-height:64px}
.form-select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;margin-bottom:12px;outline:none}
.ans-group{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.ans-row{display:flex;align-items:center;gap:8px}
.ans-radio{width:16px;height:16px;cursor:pointer;flex-shrink:0;accent-color:var(--accent)}
.ans-input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border .2s}
.ans-input:focus{border-color:var(--accent)}
.ans-input.selected{border-color:var(--green);background:rgba(34,197,94,.08)}
.form-btns{display:flex;gap:8px}
.save-btn{flex:1;padding:10px;border:1px solid var(--accent);border-radius:8px;background:rgba(0,194,255,.1);color:var(--accent);font-size:13px;cursor:pointer;font-family:inherit;font-weight:700}
.cancel-btn{padding:10px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit}

/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);padding:10px 22px;background:#22c55e;color:#fff;font-size:13px;font-weight:600;border-radius:30px;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty-msg{text-align:center;padding:2rem;color:var(--text2);font-size:13px}

/* rule changed notice */
.rule-notice{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--orange);line-height:1.6;margin-bottom:1.25rem;display:flex;gap:8px;align-items:flex-start}
</style>
</head>
<body>
<div class="wrap">
  <div class="site-header">
    <div class="logo-mark">⚽</div>
    <div>
      <div class="logo-text">FUTSAL RULE QUIZ</div>
      <div class="logo-sub">フットサル ルールクイズ</div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('quiz')">クイズ</button>
    <button class="tab" onclick="switchTab('admin')">問題管理</button>
  </div>

  <!-- QUIZ -->
  <div id="quizPanel">
    <div class="level-row">
      <button class="level-btn active" data-level="all" onclick="setLevel('all')">すべて</button>
      <button class="level-btn" data-level="easy" onclick="setLevel('easy')">初級</button>
      <button class="level-btn" data-level="mid" onclick="setLevel('mid')">中級</button>
      <button class="level-btn" data-level="hard" onclick="setLevel('hard')">上級</button>
    </div>
    <div id="quizArea">
      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="progress-label" id="progressLabel">1 / 10</div>
      </div>
      <div class="q-card">
        <div class="q-top">
          <span class="q-counter" id="qCounter">問題 1</span>
          <span class="badge" id="qBadge"></span>
        </div>
        <div class="q-text" id="qText"></div>
      </div>
      <div class="choices" id="choices"></div>
      <div class="explanation" id="explanation"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次の問題 →</button>
    </div>
    <div id="resultArea" style="display:none">
      <div class="result-card">
        <div class="result-score" id="resultScore"></div>
        <div class="result-total" id="resultTotal"></div>
        <div class="result-stats" id="resultStats"></div>
        <div class="result-msg" id="resultMsg"></div>
        <div class="result-btns">
          <button class="result-btn primary" onclick="restartQuiz()">もう一度挑戦</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="adminPanel" style="display:none">
    <div class="rule-notice">
      <span>⚠️</span>
      <span>ルール改定があったら「編集」ボタンから解説を更新してな。毎年確認推奨！</span>
    </div>
    <div class="admin-header">
      <span class="admin-count" id="adminCount"></span>
      <button class="add-btn" onclick="openForm()">＋ 問題追加</button>
    </div>
    <div class="filter-row">
      <button class="filter-chip active" data-f="all" onclick="setFilter('all')">すべて</button>
      <button class="filter-chip" data-f="easy" onclick="setFilter('easy')">初級</button>
      <button class="filter-chip" data-f="mid" onclick="setFilter('mid')">中級</button>
      <button class="filter-chip" data-f="hard" onclick="setFilter('hard')">上級</button>
    </div>
    <div id="formArea" style="display:none">
      <div class="form-card">
        <div class="form-title" id="formTitle">問題を追加</div>
        <label class="form-label">問題文</label>
        <textarea class="form-input" id="fQuestion" placeholder="例：GKがボールを手で持てる時間は？"></textarea>
        <label class="form-label">難易度</label>
        <select class="form-select" id="fLevel">
          <option value="easy">初級</option>
          <option value="mid">中級</option>
          <option value="hard">上級</option>
        </select>
        <label class="form-label">選択肢（正解をラジオボタンで選んでな）</label>
        <div class="ans-group" id="ansGroup"></div>
        <label class="form-label">解説</label>
        <textarea class="form-input" id="fExp" placeholder="正解の解説を入力"></textarea>
        <div class="form-btns">
          <button class="save-btn" onclick="saveQuestion()">保存</button>
          <button class="cancel-btn" onclick="closeForm()">キャンセル</button>
        </div>
      </div>
    </div>
    <div class="q-list" id="qList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const INITIAL=[
  {id:1,level:'easy',q:'フットサルのコートに入れる選手の人数は？（GK含む）',choices:['4人','5人','6人','7人'],ans:1,exp:'フットサルは1チーム5人（GK1人＋フィールドプレーヤー4人）でプレーします。'},
  {id:2,level:'easy',q:'フットサルのボールはサッカーと比べてどう違う？',choices:['大きくて軽い','小さくて重い','同じサイズ','大きくて重い'],ans:1,exp:'フットサルは4号球を使用。サッカーより小さく、弾みを抑えた低バウンドボールを使います。'},
  {id:3,level:'easy',q:'アウトになった場合、どうやって再開する？',choices:['スローイン','キックイン','コーナーキック','ドロップボール'],ans:1,exp:'フットサルにはスローインがなく、ボールが外に出たらキックインで再開します。'},
  {id:4,level:'easy',q:'フットサルの試合時間は1ピリオド何分？',choices:['15分','20分','25分','45分'],ans:1,exp:'フットサルは前後半各20分（計40分）。時計はプレーが止まるたびに止める実働時間制です。'},
  {id:5,level:'easy',q:'GKはボールを手で持ったまま何秒以内に放さないといけない？（4秒ルール）',choices:['3秒','4秒','5秒','10秒'],ans:1,exp:'GKはボールを手で持ったまま4秒以内に放さないといけません（4秒ルール）。足でコントロールしている場合も同様に4秒以内。超えると相手のキックインになります。'},
  {id:6,level:'easy',q:'フットサルでは何枚イエローカードをもらうと退場になる？',choices:['1枚','2枚','3枚','4枚'],ans:1,exp:'2枚目のイエローカードで退場（レッドカード相当）になります。'},
  {id:7,level:'easy',q:'フットサルのゴールのサイズは？',choices:['幅2m×高さ1m','幅3m×高さ2m','幅6m×高さ2.44m','幅7.32m×高さ2.44m'],ans:1,exp:'フットサルのゴールは幅3m×高さ2mです。サッカーのゴール（幅7.32m×高さ2.44m）より小さいです。'},
  {id:8,level:'mid',q:'キックインのとき、相手選手はボールから何メートル離れないといけない？（5メートルルール）',choices:['1m','3m','5m','10m'],ans:2,exp:'キックインのとき、相手選手はボールから5メートル以上離れないといけません（5メートルルール）。守らないと警告対象になります。'},
  {id:9,level:'mid',q:'フリーキックのとき、相手選手はボールからどのくらい離れないといけない？',choices:['1m','3m','5m','10m'],ans:2,exp:'フリーキックでも相手選手はボールから5メートル以上離れる義務があります（5メートルルール）。壁を作れますが5m以内はNGです。'},
  {id:10,level:'mid',q:'GKが手でボールを放した後、同じピリオド内で自陣の選手からのパスを手で受け取れる？',choices:['いつでも受け取れる','いったん放したら手では受け取れない','相手が触れてからなら受け取れる','4秒たてば受け取れる'],ans:2,exp:'GKがいったん放したボールを自陣選手からのパスで手で再受け取りはできません（バックパスルール）。相手がボールに触れてから初めて手で受け取れます。'},
  {id:11,level:'mid',q:'味方フィールドプレーヤーが足でGKにバックパスを出した。GKは手で取れる？',choices:['取れる','取れない','相手陣内なら取れる','GKエリア内なら取れる'],ans:1,exp:'足での意図的なバックパスをGKが手で処理することは禁止です（バックパスルール）。違反すると間接フリーキックになります。'},
  {id:12,level:'mid',q:'アキュムレートファウル（累積ファウル）が6つ以上になると？',choices:['試合終了','第2PKが与えられる','選手1人退場','警告のみ'],ans:1,exp:'1ピリオドで累積ファウルが6つ以上になると、以降のファウルは第2PK（10mライン）が与えられます。フットサル独特のルールです。'},
  {id:13,level:'mid',q:'フットサルの交代ルールはどれが正しい？',choices:['前後半合わせて3回まで','5人まで','回数・人数ともに無制限','ハーフタイムのみ'],ans:2,exp:'フットサルは回数・人数制限なしのフライングチェンジ（交代ゾーンでの随時交代）が可能です。'},
  {id:14,level:'mid',q:'選手が退場になった場合、何分後にベンチから交代選手が入れる？',choices:['1分後','2分後','5分後','入れない'],ans:1,exp:'退場後2分間は数的不利でプレー。2分後または相手がゴールを決めた後に交代選手が入れます。'},
  {id:15,level:'mid',q:'GKが自陣ゴールエリア内でボールを足でコントロールしている。4秒ルールは適用される？',choices:['適用される','足なら適用されない','エリア外に出たときから適用','GKエリア内では無制限'],ans:0,exp:'4秒ルールはGKがボールをコントロールしている状態全般に適用されます。手でも足でも、GKが意図的にコントロールしていれば4秒以内に放たなければなりません。'},
  {id:16,level:'hard',q:'GKが4秒以内に放したが、すぐ別の味方に渡してまたGKに戻した場合は？',choices:['問題なし','間接フリーキック','直接フリーキック','第2PK'],ans:1,exp:'GKが放したボールを意図的に同じピリオド内で手で再受け取りするのは違反。間接フリーキックになります（バックパスルールの一部）。'},
  {id:17,level:'hard',q:'タイムアウトは1チーム各ピリオドに何回取れる？',choices:['1回','2回','3回','なし'],ans:0,exp:'タイムアウトは各チーム各ピリオドに1回（1分間）取れます。延長戦では各1回追加されます。'},
  {id:18,level:'hard',q:'キックインのキッカーは、他の選手が触れる前に再びボールに触れられる？',choices:['触れない','触れる','足なら触れる','GKなら触れる'],ans:0,exp:'キックインのキッカーは、他の選手がボールに触れるまで再びボールに触れることができません。違反すると相手のキックインになります。'},
  {id:19,level:'hard',q:'ゴールクリアランスの説明として正しいのは？',choices:['GKが手でボールを投げて再開','攻撃側がゴールラインを出したときGKがエリア内からキックで再開','ゴール前でのコーナーキック','守備側がゴールラインを出したときの再開'],ans:1,exp:'ゴールクリアランスは攻撃側がボールをゴールラインの外に出したとき、GKがゴールエリア内からキックで再開する方法です。'},
  {id:20,level:'hard',q:'第2PK（10mPK）でGKはキックされるまでどこにいないといけない？',choices:['ゴールライン上','ゴールエリア内ならどこでも','動き方の制限なし','ゴールポストに触れていないといけない'],ans:0,exp:'第2PKではGKはキックされるまでゴールライン上にいなければなりません。左右にポスト間を動くことは可能です。'},

  // === 追加問題（初級） ===
  {id:21,level:'easy',q:'フットサルのコートの大きさとして正しいのは？',choices:['縦90m×横60m','縦40m×横20m（最小）〜縦42m×横25m（最大）','縦105m×横68m','縦50m×横30m'],ans:1,exp:'フットサルコートは国際基準で縦38〜42m×横18〜25m程度。サッカーコートよりずっと小さいです。'},

let questions=[];
let editingId=null;
let currentLevel='all';
let adminFilter='all';
let quizCurrent=0;
let quizScore=0;
let quizAnswered=false;
let quizQuestions=[];
let correctCount=0;
let wrongCount=0;
let nextId=100;

function init(){
  try{
    const saved=localStorage.getItem('futsalQuiz_v4');
    if(saved){const d=JSON.parse(saved);questions=d.questions;nextId=d.nextId||200;}
    else{questions=JSON.parse(JSON.stringify(INITIAL));}
  }catch(e){questions=JSON.parse(JSON.stringify(INITIAL));}
  renderAdmin();
  restartQuiz();
}
function persist(){
  try{localStorage.setItem('futsalQuiz_v4',JSON.stringify({questions,nextId}));}catch(e){}
}
function showToast(msg,isErr=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=isErr?'#ef4444':'#22c55e';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('quizPanel').style.display=tab==='quiz'?'':'none';
  document.getElementById('adminPanel').style.display=tab==='admin'?'':'none';
  if(tab==='admin')renderAdmin();
}

/* QUIZ */
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function setLevel(level){
  currentLevel=level;
  document.querySelectorAll('.level-btn').forEach(b=>b.classList.toggle('active',b.dataset.level===level));
  restartQuiz();
}
function restartQuiz(){
  quizCurrent=0;quizScore=0;quizAnswered=false;correctCount=0;wrongCount=0;
  const pool=currentLevel==='all'?questions:questions.filter(q=>q.level===currentLevel);
  quizQuestions=shuffle(pool).slice(0,Math.min(10,pool.length));
  document.getElementById('quizArea').style.display='';
  document.getElementById('resultArea').style.display='none';
  if(quizQuestions.length===0){
    document.getElementById('quizArea').innerHTML='<div class="empty-msg">このレベルの問題がありません</div>';
    return;
  }
  showQuestion();
}
function showQuestion(){
  const q=quizQuestions[quizCurrent];
  const total=quizQuestions.length;
  document.getElementById('progressFill').style.width=(quizCurrent/total*100)+'%';
  document.getElementById('progressLabel').textContent=`${quizCurrent+1} / ${total}`;
  document.getElementById('qCounter').textContent=`問題 ${quizCurrent+1}`;
  const badge=document.getElementById('qBadge');
  const bMap={easy:['初級','badge-easy'],mid:['中級','badge-mid'],hard:['上級','badge-hard']};
  badge.textContent=bMap[q.level][0];badge.className='badge '+bMap[q.level][1];
  document.getElementById('qText').textContent=q.q;
  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  q.choices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';btn.textContent=c;
    btn.onclick=()=>selectAnswer(i);
    choicesEl.appendChild(btn);
  });
  document.getElementById('explanation').className='explanation';
  document.getElementById('nextBtn').className='next-btn';
  quizAnswered=false;
}
function selectAnswer(idx){
  if(quizAnswered)return;
  quizAnswered=true;
  const q=quizQuestions[quizCurrent];
  document.querySelectorAll('.choice-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(i===q.ans)btn.classList.add('correct');
    else if(i===idx&&i!==q.ans)btn.classList.add('wrong');
  });
  if(idx===q.ans){quizScore++;correctCount++;}else wrongCount++;
  const expEl=document.getElementById('explanation');
  expEl.textContent=q.exp;expEl.className='explanation show';
  document.getElementById('nextBtn').className='next-btn show';
}
function nextQuestion(){
  quizCurrent++;
  if(quizCurrent>=quizQuestions.length)showResult();
  else showQuestion();
}
function showResult(){
  document.getElementById('quizArea').style.display='none';
  document.getElementById('resultArea').style.display='';
  const total=quizQuestions.length;
  document.getElementById('resultScore').textContent=quizScore;
  document.getElementById('resultTotal').textContent=`/ ${total}問`;
  document.getElementById('resultStats').innerHTML=`
    <div class="stat"><div class="stat-label">正解</div><div class="stat-val" style="color:#22c55e">${correctCount}</div></div>
    <div class="stat"><div class="stat-label">不正解</div><div class="stat-val" style="color:#ef4444">${wrongCount}</div></div>`;
  const pct=quizScore/total;
  const msgs=['まだまだこれから！繰り返して覚えていこう。','まずまずやな。間違えたとこを復習しよう！','ええ感じやで！あと少しで審判も安心。','ほぼ完璧！審判ライセンス余裕やで！'];
  document.getElementById('resultMsg').textContent=msgs[pct>=0.9?3:pct>=0.7?2:pct>=0.5?1:0];
}

/* ADMIN */
function setFilter(f){
  adminFilter=f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.f===f));
  renderAdmin();
}
function renderAdmin(){
  const filtered=adminFilter==='all'?questions:questions.filter(q=>q.level===adminFilter);
  document.getElementById('adminCount').textContent=`全${questions.length}問`;
  const bLabel={easy:'初級',mid:'中級',hard:'上級'};
  const bClass={easy:'badge-easy',mid:'badge-mid',hard:'badge-hard'};
  const listEl=document.getElementById('qList');
  if(filtered.length===0){listEl.innerHTML='<div class="empty-msg">問題がありません</div>';return;}
  listEl.innerHTML=filtered.map(q=>`
    <div class="q-item">
      <div class="q-item-header">
        <div class="q-item-text">${q.q}</div>
        <div class="q-item-actions">
          <button class="edit-btn" onclick="openForm(${q.id})">編集</button>
          <button class="del-btn" onclick="deleteQ(${q.id})">削除</button>
        </div>
      </div>
      <div class="q-item-meta"><span class="badge ${bClass[q.level]}">${bLabel[q.level]}</span> 正解：${q.choices[q.ans]}</div>
    </div>`).join('');
}
function openForm(id=null){
  editingId=id;
  document.getElementById('formArea').style.display='';
  document.getElementById('formTitle').textContent=id?'問題を編集':'問題を追加';
  const q=id?questions.find(x=>x.id===id):null;
  document.getElementById('fQuestion').value=q?q.q:'';
  document.getElementById('fLevel').value=q?q.level:'easy';
  document.getElementById('fExp').value=q?q.exp:'';
  const choices=q?q.choices:['','','',''];
  const ans=q?q.ans:0;
  document.getElementById('ansGroup').innerHTML=choices.map((c,i)=>`
    <div class="ans-row">
      <input type="radio" name="ansRadio" class="ans-radio" value="${i}" ${i===ans?'checked':''} onchange="updateHighlight()">
      <input type="text" class="ans-input${i===ans?' selected':''}" id="c${i}" value="${c}" placeholder="選択肢${i+1}" oninput="updateHighlight()">
    </div>`).join('');
  document.getElementById('formArea').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function updateHighlight(){
  const sel=document.querySelector('input[name="ansRadio"]:checked');
  if(!sel)return;
  const idx=parseInt(sel.value);
  [0,1,2,3].forEach(i=>{const el=document.getElementById('c'+i);if(el)el.className='ans-input'+(i===idx?' selected':'');});
}
function closeForm(){document.getElementById('formArea').style.display='none';editingId=null;}
function saveQuestion(){
  const qText=document.getElementById('fQuestion').value.trim();
  const level=document.getElementById('fLevel').value;
  const exp=document.getElementById('fExp').value.trim();
  const choices=[0,1,2,3].map(i=>(document.getElementById('c'+i)||{value:''}).value.trim());
  const selRadio=document.querySelector('input[name="ansRadio"]:checked');
  if(!qText||choices.some(c=>!c)||!exp){showToast('全項目を入力してな',true);return;}
  if(!selRadio){showToast('正解を選んでな',true);return;}
  const ans=parseInt(selRadio.value);
  if(editingId){
    const idx=questions.findIndex(x=>x.id===editingId);
    if(idx>-1)questions[idx]={...questions[idx],q:qText,level,choices,ans,exp};
    showToast('更新したで！');
  }else{
    questions.push({id:nextId++,level,q:qText,choices,ans,exp});
    showToast('追加したで！');
  }
  persist();closeForm();renderAdmin();
}
function deleteQ(id){
  if(!confirm('この問題を削除してええ？'))return;
  questions=questions.filter(x=>x.id!==id);
  persist();showToast('削除したで');renderAdmin();
}
init();
</script>
</body>
</html>
