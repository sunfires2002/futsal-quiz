<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フットサル ルールクイズ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--surface:#13161e;--surface2:#1a1e2a;--surface3:#222736;
  --border:#2c3144;--text:#e8eaf2;--text2:#7b849a;--text3:#4e5568;
  --accent:#00d4ff;--accent2:#7c5cfc;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;
  --radius:12px;--radius-sm:8px;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.25rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.logo-name{font-size:14px;font-weight:700;letter-spacing:.06em}
.logo-sub{font-size:10px;color:var(--text2);letter-spacing:.04em}
.admin-toggle{padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit}
.admin-toggle.active{border-color:var(--accent2);color:var(--accent2)}

.main{max-width:560px;margin:0 auto;padding:1.5rem 1rem 4rem}

/* hero */
.hero{text-align:center;padding:1.5rem 0 1.25rem}
.hero-title{font-size:24px;font-weight:700;letter-spacing:.04em;margin-bottom:.4rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:13px;color:var(--text2);line-height:1.6}

/* stage map */
.stage-map{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:1.5rem;padding:1.25rem;background:var(--surface);border:1px solid var(--border);border-radius:14px}
.stage-node{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.stage-icon{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid var(--border);background:var(--surface2);transition:all .3s;position:relative}
.stage-icon.unlocked{border-color:var(--orange);background:rgba(245,158,11,.1)}
.stage-icon.current{border-color:var(--accent);background:rgba(0,212,255,.1);box-shadow:0 0 16px rgba(0,212,255,.3)}
.stage-icon.cleared{border-color:var(--green);background:rgba(34,197,94,.1)}
.stage-icon.locked{opacity:.35}
.stage-check{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--green);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700}
.stage-label{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.04em}
.stage-label.current{color:var(--accent)}
.stage-label.cleared{color:var(--green)}
.stage-connector{flex:0 0 24px;height:2px;background:var(--border);margin-bottom:22px}
.stage-connector.cleared{background:var(--green)}

/* pass bar */
.pass-info{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between}
.pass-text{font-size:13px;color:var(--text2);line-height:1.5}
.pass-text strong{color:var(--text);display:block;font-size:14px;margin-bottom:2px}
.pass-badge{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;background:rgba(245,158,11,.15);color:var(--orange);white-space:nowrap}

/* start btn */
.start-btn{width:100%;padding:14px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.05em;margin-bottom:.75rem;transition:opacity .2s}
.start-btn:hover{opacity:.88}
.start-btn:disabled{opacity:.4;cursor:not-allowed}
.reset-btn{width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s}
.reset-btn:hover{border-color:var(--red);color:var(--red)}

/* quiz */
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.progress-bar{flex:1;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s ease}
.progress-label{font-size:12px;color:var(--text2);white-space:nowrap;min-width:40px;text-align:right}

.q-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.375rem;margin-bottom:1rem}
.q-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem}
.q-num{font-size:12px;color:var(--text2)}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.03em}
.badge-easy{background:rgba(34,197,94,.15);color:var(--green)}
.badge-mid{background:rgba(245,158,11,.15);color:var(--orange)}
.badge-hard{background:rgba(239,68,68,.15);color:var(--red)}
.q-text{font-size:15px;font-weight:600;line-height:1.65;color:var(--text)}

.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.choice-btn{padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:14px;text-align:left;cursor:pointer;font-family:inherit;line-height:1.45;transition:all .15s;display:flex;align-items:center;gap:10px}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(0,212,255,.05)}
.choice-num{width:22px;height:22px;border-radius:50%;background:var(--surface3);color:var(--text2);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.choice-btn.correct{border-color:var(--green);background:rgba(34,197,94,.1)}
.choice-btn.correct .choice-num{background:var(--green);color:#fff}
.choice-btn.wrong{border-color:var(--red);background:rgba(239,68,68,.1)}
.choice-btn.wrong .choice-num{background:var(--red);color:#fff}

.explanation{padding:12px 14px;border-radius:var(--radius-sm);background:rgba(124,92,252,.1);border-left:3px solid var(--accent2);font-size:13px;color:var(--text2);line-height:1.75;margin-bottom:1rem;display:none}
.explanation.show{display:block}
.next-btn{width:100%;padding:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;display:none;transition:all .2s}
.next-btn.show{display:block}
.next-btn:hover{border-color:var(--accent);color:var(--accent)}

/* result */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem 1.5rem;text-align:center}
.result-icon{font-size:52px;margin-bottom:.5rem}
.result-score{font-size:56px;font-weight:700;line-height:1;margin-bottom:.25rem}
.result-score.pass{background:linear-gradient(135deg,var(--green),#86efac);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-score.fail{background:linear-gradient(135deg,var(--red),#fca5a5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-denom{font-size:15px;color:var(--text2);margin-bottom:.75rem}
.result-verdict{font-size:18px;font-weight:700;margin-bottom:.5rem}
.result-verdict.pass{color:var(--green)}
.result-verdict.fail{color:var(--red)}
.result-msg{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:1.5rem}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
.result-stat{background:var(--surface2);border-radius:var(--radius-sm);padding:.875rem}
.result-stat-val{font-size:24px;font-weight:700}
.result-stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.result-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.result-btn{padding:11px 22px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s}
.result-btn.primary{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.07)}
.result-btn.green{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.07)}
.result-btn:hover{opacity:.8}

/* levelup animation */
@keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.levelup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
.levelup-overlay.show{display:flex}
.levelup-box{background:var(--surface);border:1px solid var(--accent);border-radius:20px;padding:2.5rem 2rem;text-align:center;max-width:320px;width:90%;animation:pop .5s ease}
.levelup-emoji{font-size:56px;margin-bottom:.75rem;display:block;animation:pop .6s .1s both}
.levelup-title{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
.levelup-sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:1.5rem}
.levelup-btn{width:100%;padding:13px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}

/* allclear */
.allclear-box{background:var(--surface);border:1px solid var(--orange);border-radius:20px;padding:2.5rem 2rem;text-align:center;max-width:320px;width:90%;animation:pop .5s ease}
.allclear-emoji{font-size:60px;margin-bottom:.75rem;display:block}
.allclear-title{font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--orange),#fcd34d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
.allclear-sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:1.5rem}
.allclear-btn{width:100%;padding:13px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--orange),#fcd34d);color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}

/* admin */
.admin-panel{display:none}
.admin-panel.show{display:block}
.admin-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.admin-title{font-size:14px;font-weight:600}
.add-btn{padding:8px 14px;border:1px solid var(--accent2);border-radius:var(--radius-sm);background:rgba(124,92,252,.1);color:var(--accent2);font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.filter-row{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.filter-chip{padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
.filter-chip.active{border-color:var(--accent);color:var(--accent)}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.form-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:1rem}
.form-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;margin-bottom:12px;outline:none;transition:border .2s}
.form-input:focus{border-color:var(--accent)}
textarea.form-input{resize:vertical;min-height:64px}
select.form-input{cursor:pointer}
.ans-group{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.ans-row{display:flex;align-items:center;gap:8px}
.ans-radio{width:16px;height:16px;cursor:pointer;flex-shrink:0;accent-color:var(--accent)}
.ans-input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border .2s}
.ans-input:focus{border-color:var(--accent)}
.ans-input.selected{border-color:var(--green);background:rgba(34,197,94,.08)}
.form-btns{display:flex;gap:8px}
.save-btn{flex:1;padding:10px;border:1px solid var(--accent);border-radius:var(--radius-sm);background:rgba(0,212,255,.08);color:var(--accent);font-size:13px;cursor:pointer;font-family:inherit;font-weight:700}
.cancel-btn{padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit}
.q-list{display:flex;flex-direction:column;gap:8px}
.q-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.q-item-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.q-item-text{font-size:13px;font-weight:500;color:var(--text);flex:1;line-height:1.5}
.q-item-actions{display:flex;gap:6px;flex-shrink:0}
.edit-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit}
.del-btn{padding:4px 10px;border:1px solid rgba(239,68,68,.4);border-radius:6px;background:rgba(239,68,68,.08);color:var(--red);font-size:12px;cursor:pointer;font-family:inherit}
.q-item-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.rule-notice{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--orange);line-height:1.6;margin-bottom:1rem;display:flex;gap:8px}
.error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;color:var(--red);margin-bottom:1rem}
.empty-msg{text-align:center;padding:2rem;color:var(--text2);font-size:13px}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);padding:10px 22px;font-size:13px;font-weight:600;border-radius:30px;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;z-index:999;color:#fff}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* timer */
.timer-wrap{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.timer-bar-bg{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.timer-bar-fill{height:100%;border-radius:3px;transition:width .1s linear,background .3s}
.timer-num{font-size:15px;font-weight:700;min-width:32px;text-align:right;transition:color .3s}
.timer-num.danger{color:var(--red)}
.timer-bar-fill.safe{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.timer-bar-fill.danger{background:var(--red)}
.timeout-msg{text-align:center;padding:8px;font-size:13px;color:var(--red);font-weight:600;margin-bottom:.5rem;display:none}
.timeout-msg.show{display:block}

/* mode select */
.mode-row{display:flex;gap:8px;margin-bottom:1.25rem}
.mode-btn{flex:1;padding:10px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s;line-height:1.4}
.mode-btn span{display:block;font-size:10px;margin-top:2px;color:var(--text3)}
.mode-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.07)}
.mode-btn.active span{color:var(--accent)}

/* panels */
#homeScreen,#quizWrap,#resultWrap{display:none}
#homeScreen.show,#quizWrap.show,#resultWrap.show{display:block}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">⚽</div>
    <div>
      <div class="logo-name">FUTSAL QUIZ</div>
      <div class="logo-sub">フットサル ルールクイズ</div>
    </div>
  </div>
  <button class="admin-toggle" id="adminToggle" onclick="toggleAdmin()">管理画面</button>
</div>

<div class="main">
  <div id="quizPanel">
    <div class="hero">
      <div class="hero-title">FUTSAL RULE QUIZ</div>
      <div class="hero-sub">初級→中級→上級をクリアして<br>審判ライセンスへの道を制覇しよう！</div>
    </div>

    <!-- HOME -->
    <div id="homeScreen" class="show">
      <div class="stage-map" id="stageMap"></div>
      <div class="pass-info">
        <div class="pass-text">
          <strong>合格ライン：10問中8問以上</strong>
          クリアしないと次のレベルへ進めないで！
        </div>
        <div class="pass-badge">80%</div>
      </div>
      <div class="section-label">モードを選択</div>
      <div class="mode-row">
        <button class="mode-btn active" data-mode="normal" onclick="setMode('normal')">📖 通常モード<span>じっくり考える</span></button>
        <button class="mode-btn" data-mode="time" onclick="setMode('time')">⏱ タイムアタック<span>5秒で判断！</span></button>
      </div>
      <button class="start-btn" id="startBtn" onclick="startQuiz()" disabled>読み込み中...</button>
      <button class="reset-btn" onclick="resetProgress()">🔄 最初からやり直す</button>
    </div>

    <!-- QUIZ -->
    <div id="quizWrap">
      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="progress-label" id="progressLabel">1/10</div>
      </div>
      <div class="timer-wrap" id="timerWrap" style="display:none">
        <div class="timer-bar-bg"><div class="timer-bar-fill safe" id="timerBar" style="width:100%"></div></div>
        <div class="timer-num" id="timerNum">15</div>
      </div>
      <div class="timeout-msg" id="timeoutMsg">⏰ 時間切れ！不正解や！</div>
      <div class="q-card">
        <div class="q-top">
          <span class="q-num" id="qNum">問題 1</span>
          <span class="badge" id="qBadge"></span>
        </div>
        <div class="q-text" id="qText"></div>
      </div>
      <div class="choices" id="choices"></div>
      <div class="explanation" id="explanation"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次の問題 →</button>
    </div>

    <!-- RESULT -->
    <div id="resultWrap">
      <div class="result-card">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-score" id="resultScore"></div>
        <div class="result-denom" id="resultDenom"></div>
        <div class="result-verdict" id="resultVerdict"></div>
        <div class="result-grid" id="resultGrid"></div>
        <div class="result-msg" id="resultMsg"></div>
        <div class="result-btns" id="resultBtns"></div>
      </div>
    </div>
  </div>

  <!-- ADMIN -->
  <div class="admin-panel" id="adminPanel">
    <div class="rule-notice"><span>⚠️</span><span>ルール改定があったら「編集」から更新してな。毎年確認推奨！</span></div>
    <div class="admin-head">
      <span class="admin-title" id="adminCount">問題一覧</span>
      <button class="add-btn" onclick="openForm()">＋ 追加</button>
    </div>
    <div class="filter-row">
      <button class="filter-chip active" data-f="all" onclick="setAdminFilter('all')">すべて</button>
      <button class="filter-chip" data-f="easy" onclick="setAdminFilter('easy')">初級</button>
      <button class="filter-chip" data-f="mid" onclick="setAdminFilter('mid')">中級</button>
      <button class="filter-chip" data-f="hard" onclick="setAdminFilter('hard')">上級</button>
    </div>
    <div id="formArea" style="display:none">
      <div class="form-card">
        <div class="form-title" id="formTitle">問題を追加</div>
        <div id="formError"></div>
        <label class="form-label">問題文</label>
        <textarea class="form-input" id="fQuestion"></textarea>
        <label class="form-label">難易度</label>
        <select class="form-input" id="fLevel">
          <option value="easy">初級</option>
          <option value="mid">中級</option>
          <option value="hard">上級</option>
        </select>
        <label class="form-label">選択肢（正解をラジオボタンで選んでな）</label>
        <div class="ans-group" id="ansGroup"></div>
        <label class="form-label">解説</label>
        <textarea class="form-input" id="fExp"></textarea>
        <div class="form-btns">
          <button class="save-btn" id="saveBtn" onclick="saveQuestion()">保存</button>
          <button class="cancel-btn" onclick="closeForm()">キャンセル</button>
        </div>
      </div>
    </div>
    <div id="adminList"></div>
  </div>
</div>

<!-- LEVELUP OVERLAY -->
<div class="levelup-overlay" id="levelupOverlay">
  <div class="levelup-box" id="levelupBox">
    <span class="levelup-emoji" id="levelupEmoji"></span>
    <div class="levelup-title" id="levelupTitle"></div>
    <div class="levelup-sub" id="levelupSub"></div>
    <button class="levelup-btn" id="levelupBtn" onclick="dismissLevelup()"></button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://bxailsvrusrbjmbhlpqh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8gzvjce_ch1-c-Bwzfm-FA_Q2rHy8G0';
const TABLE = 'quiz_questions';
const PASS_SCORE = 8;
const QUIZ_COUNT = 10;
const TIME_LIMIT = 5;

let currentMode = 'normal';
let timerInterval = null;
let timeLeft = TIME_LIMIT;
let timedOut = false;

const STAGES = [
  {level:'easy', label:'初級', emoji:'🌱', desc:'基本ルール'},
  {level:'mid',  label:'中級', emoji:'⚡', desc:'審判向け'},
  {level:'hard', label:'上級', emoji:'🏆', desc:'マニアック'},
];

let allQuestions = [];
let quizQuestions = [];
let quizCurrent = 0;
let quizScore = 0;
let quizAnswered = false;
let correctCount = 0;
let wrongCount = 0;
let adminFilter = 'all';
let editingId = null;

// progress: {easy:'cleared'|'unlocked', mid:'locked'|'unlocked'|'cleared', hard:'locked'|...}
let progress = {easy:'unlocked', mid:'locked', hard:'locked'};
let currentStage = 'easy';

function loadProgress() {
  try {
    const s = localStorage.getItem('futsalQuizProgress');
    if (s) progress = JSON.parse(s);
  } catch(e) {}
  // determine currentStage
  if (progress.hard === 'unlocked') currentStage = 'hard';
  else if (progress.mid === 'unlocked') currentStage = 'mid';
  else currentStage = 'easy';
}

function saveProgress() {
  localStorage.setItem('futsalQuizProgress', JSON.stringify(progress));
}

function resetProgress() {
  if (!confirm('進捗をリセットして最初からやり直す？')) return;
  progress = {easy:'unlocked', mid:'locked', hard:'locked'};
  currentStage = 'easy';
  saveProgress();
  renderStageMap();
  showToast('リセットしたで！');
}

// Supabase
async function sbFetch(path, options={}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || '',
      ...options.headers
    }
  });
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return null;
  return res.json();
}

async function init() {
  loadProgress();
  try {
    allQuestions = await sbFetch(TABLE + '?order=id.asc') || [];
    const btn = document.getElementById('startBtn');
    btn.disabled = false;
    btn.textContent = currentStage === 'easy' ? '初級からスタート →' :
                      currentStage === 'mid'  ? '中級にチャレンジ →' : '上級にチャレンジ →';
  } catch(e) {
    document.getElementById('startBtn').textContent = '接続エラー';
  }
  renderStageMap();
}

function renderStageMap() {
  const map = document.getElementById('stageMap');
  map.innerHTML = '';
  STAGES.forEach((s, i) => {
    const state = progress[s.level] || 'locked';
    const node = document.createElement('div');
    node.className = 'stage-node';
    const isCurrent = (state === 'unlocked');
    node.innerHTML = `
      <div class="stage-icon ${state}">
        ${s.emoji}
        ${state === 'cleared' ? '<div class="stage-check">✓</div>' : ''}
      </div>
      <div class="stage-label ${isCurrent ? 'current' : state === 'cleared' ? 'cleared' : ''}">${s.label}</div>
    `;
    map.appendChild(node);
    if (i < STAGES.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'stage-connector' + (progress[STAGES[i].level] === 'cleared' ? ' cleared' : '');
      map.appendChild(conn);
    }
  });
}

// Quiz
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
}

function startQuiz() {
  const pool = allQuestions.filter(q => q.level === currentStage);
  if (pool.length === 0) { showToast('問題がありません', '#ef4444'); return; }
  quizQuestions = shuffle(pool).slice(0, Math.min(QUIZ_COUNT, pool.length));
  quizCurrent = 0; quizScore = 0; correctCount = 0; wrongCount = 0; quizAnswered = false;
  showPanel('quizWrap');
  showQuestion();
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function startTimer() {
  stopTimer();
  timeLeft = TIME_LIMIT;
  timedOut = false;
  updateTimerUI();
  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    if (timeLeft <= 0) {
      timeLeft = 0;
      updateTimerUI();
      stopTimer();
      onTimeout();
    } else {
      updateTimerUI();
    }
  }, 100);
}

function updateTimerUI() {
  const num = document.getElementById('timerNum');
  const bar = document.getElementById('timerBar');
  const secs = Math.ceil(timeLeft);
  num.textContent = secs;
  const pct = (timeLeft / TIME_LIMIT) * 100;
  bar.style.width = pct + '%';
  const danger = timeLeft <= 2;
  num.className = 'timer-num' + (danger ? ' danger' : '');
  bar.className = 'timer-bar-fill ' + (danger ? 'danger' : 'safe');
}

function onTimeout() {
  timedOut = true;
  wrongCount++;
  // show correct answer
  const q = quizQuestions[quizCurrent];
  document.querySelectorAll('.choice-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer_index) btn.classList.add('correct');
  });
  document.getElementById('timeoutMsg').classList.add('show');
  const expEl = document.getElementById('explanation');
  expEl.textContent = q.explanation;
  expEl.className = 'explanation show';
  document.getElementById('nextBtn').className = 'next-btn show';
}

function showQuestion() {
  const q = quizQuestions[quizCurrent];
  const total = quizQuestions.length;
  document.getElementById('progressFill').style.width = (quizCurrent/total*100) + '%';
  document.getElementById('progressLabel').textContent = (quizCurrent+1) + '/' + total;
  document.getElementById('qNum').textContent = '問題 ' + (quizCurrent+1);
  const badge = document.getElementById('qBadge');
  const bMap = {easy:['初級','badge-easy'],mid:['中級','badge-mid'],hard:['上級','badge-hard']};
  badge.textContent = bMap[q.level][0]; badge.className = 'badge ' + bMap[q.level][1];
  document.getElementById('qText').textContent = q.question;
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const labels = ['A','B','C','D'];
  q.choices.forEach((c,i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = '<span class="choice-num">' + labels[i] + '</span>' + c;
    btn.onclick = () => selectAnswer(i);
    choicesEl.appendChild(btn);
  });
  document.getElementById('explanation').className = 'explanation';
  document.getElementById('nextBtn').className = 'next-btn';
  document.getElementById('timeoutMsg').classList.remove('show');
  quizAnswered = false;
  // timer
  const timerWrap = document.getElementById('timerWrap');
  if (currentMode === 'time') {
    timerWrap.style.display = 'flex';
    startTimer();
  } else {
    timerWrap.style.display = 'none';
    stopTimer();
  }
}

function selectAnswer(idx) {
  if (quizAnswered || timedOut) return;
  quizAnswered = true;
  stopTimer();
  const q = quizQuestions[quizCurrent];
  document.querySelectorAll('.choice-btn').forEach((btn,i) => {
    btn.disabled = true;
    if (i === q.answer_index) btn.classList.add('correct');
    else if (i === idx && i !== q.answer_index) btn.classList.add('wrong');
  });
  if (idx === q.answer_index) { quizScore++; correctCount++; } else wrongCount++;
  const expEl = document.getElementById('explanation');
  expEl.textContent = q.explanation; expEl.className = 'explanation show';
  document.getElementById('nextBtn').className = 'next-btn show';
}

function nextQuestion() {
  stopTimer();
  timedOut = false;
  quizCurrent++;
  if (quizCurrent >= quizQuestions.length) showResult();
  else showQuestion();
}

function showResult() {
  stopTimer();
  const total = quizQuestions.length;
  const passed = quizScore >= PASS_SCORE;
  showPanel('resultWrap');
  document.getElementById('resultIcon').textContent = passed ? '🎉' : '😤';
  const scoreEl = document.getElementById('resultScore');
  scoreEl.textContent = quizScore;
  scoreEl.className = 'result-score ' + (passed ? 'pass' : 'fail');
  document.getElementById('resultDenom').textContent = '/ ' + total + '問';
  const verdict = document.getElementById('resultVerdict');
  verdict.textContent = passed ? '合格！' : '不合格…';
  verdict.className = 'result-verdict ' + (passed ? 'pass' : 'fail');
  document.getElementById('resultGrid').innerHTML =
    '<div class="result-stat"><div class="result-stat-val" style="color:var(--green)">' + correctCount + '</div><div class="result-stat-label">正解</div></div>' +
    '<div class="result-stat"><div class="result-stat-val" style="color:var(--red)">' + wrongCount + '</div><div class="result-stat-label">不正解</div></div>';

  const stageIdx = STAGES.findIndex(s => s.level === currentStage);
  const nextStage = STAGES[stageIdx + 1];

  let msg = '', btns = '';
  if (passed) {
    if (nextStage) {
      msg = `${STAGES[stageIdx].label}クリア！次は${nextStage.label}に挑戦やで！`;
      btns = `<button class="result-btn green" onclick="goNextStage()">次のレベルへ →</button>
              <button class="result-btn" onclick="retryQuiz()">もう一度</button>`;
    } else {
      msg = '全レベルクリア！フットサル審判の準備は完璧や！🏆';
      btns = `<button class="result-btn primary" onclick="showAllClear()">結果を見る 🏆</button>
              <button class="result-btn" onclick="retryQuiz()">もう一度</button>`;
    }
    // update progress
    progress[currentStage] = 'cleared';
    if (nextStage) progress[nextStage.level] = 'unlocked';
    saveProgress();
  } else {
    const remaining = PASS_SCORE - quizScore;
    msg = `合格まであと${remaining}問！もう一度チャレンジしよう。（合格ライン：${PASS_SCORE}/${total}問）`;
    btns = `<button class="result-btn primary" onclick="retryQuiz()">もう一度挑戦</button>
            <button class="result-btn" onclick="backToHome()">ホームへ</button>`;
  }
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultBtns').innerHTML = btns;

  if (passed && nextStage) {
    setTimeout(() => showLevelup(nextStage), 800);
  } else if (passed && !nextStage) {
    setTimeout(() => showAllClear(), 800);
  }
}

function goNextStage() {
  const stageIdx = STAGES.findIndex(s => s.level === currentStage);
  currentStage = STAGES[stageIdx + 1].level;
  const btn = document.getElementById('startBtn');
  btn.textContent = `${STAGES[stageIdx+1].label}にチャレンジ →`;
  renderStageMap();
  startQuiz();
}

function retryQuiz() { startQuiz(); }

function backToHome() {
  renderStageMap();
  const stageIdx = STAGES.findIndex(s => s.level === currentStage);
  const btn = document.getElementById('startBtn');
  btn.textContent = `${STAGES[stageIdx].label}にチャレンジ →`;
  showPanel('homeScreen');
}

function showLevelup(nextStage) {
  const overlay = document.getElementById('levelupOverlay');
  document.getElementById('levelupEmoji').textContent = nextStage.emoji;
  document.getElementById('levelupTitle').textContent = 'LEVEL UP！';
  document.getElementById('levelupSub').textContent = `${nextStage.label}のカギが解放されたで！\n次は${nextStage.desc}問題に挑戦や！`;
  document.getElementById('levelupBtn').textContent = `${nextStage.label}へ進む →`;
  overlay.classList.add('show');
}

function dismissLevelup() {
  document.getElementById('levelupOverlay').classList.remove('show');
  goNextStage();
}

function showAllClear() {
  const overlay = document.getElementById('levelupOverlay');
  const box = document.getElementById('levelupBox');
  box.className = 'allclear-box';
  box.innerHTML = `
    <span class="allclear-emoji">🏆</span>
    <div class="allclear-title">全ステージクリア！</div>
    <div class="allclear-sub">おめでとう！フットサルのルールをマスターしたで！<br>審判ライセンス取得も余裕やな！</div>
    <button class="allclear-btn" onclick="document.getElementById('levelupOverlay').classList.remove('show');resetProgress();">最初からやり直す</button>
  `;
  overlay.classList.add('show');
}

function showPanel(id) {
  ['homeScreen','quizWrap','resultWrap'].forEach(p => {
    document.getElementById(p).classList.toggle('show', p === id);
  });
}

// Admin
function toggleAdmin() {
  const panel = document.getElementById('adminPanel');
  const quiz = document.getElementById('quizPanel');
  const btn = document.getElementById('adminToggle');
  const isShowing = panel.classList.contains('show');
  panel.classList.toggle('show', !isShowing);
  quiz.style.display = isShowing ? '' : 'none';
  btn.classList.toggle('active', !isShowing);
  btn.textContent = isShowing ? '管理画面' : '← 戻る';
  if (!isShowing) renderAdmin();
}

function setAdminFilter(f) {
  adminFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.f === f));
  renderAdmin();
}

function renderAdmin() {
  const filtered = adminFilter === 'all' ? allQuestions : allQuestions.filter(q => q.level === adminFilter);
  document.getElementById('adminCount').textContent = '問題一覧（全' + allQuestions.length + '問）';
  const bLabel = {easy:'初級',mid:'中級',hard:'上級'};
  const bClass = {easy:'badge-easy',mid:'badge-mid',hard:'badge-hard'};
  const listEl = document.getElementById('adminList');
  if (filtered.length === 0) { listEl.innerHTML = '<div class="empty-msg">問題がありません</div>'; return; }
  listEl.innerHTML = filtered.map(q => `
    <div class="q-item">
      <div class="q-item-header">
        <div class="q-item-text">${q.question}</div>
        <div class="q-item-actions">
          <button class="edit-btn" onclick="openForm(${q.id})">編集</button>
          <button class="del-btn" onclick="deleteQ(${q.id})">削除</button>
        </div>
      </div>
      <div class="q-item-meta"><span class="badge ${bClass[q.level]}">${bLabel[q.level]}</span> 正解：${q.choices[q.answer_index]}</div>
    </div>`).join('');
}

function openForm(id=null) {
  editingId = id;
  document.getElementById('formArea').style.display = '';
  document.getElementById('formTitle').textContent = id ? '問題を編集' : '問題を追加';
  document.getElementById('formError').innerHTML = '';
  const q = id ? allQuestions.find(x => x.id === id) : null;
  document.getElementById('fQuestion').value = q ? q.question : '';
  document.getElementById('fLevel').value = q ? q.level : 'easy';
  document.getElementById('fExp').value = q ? q.explanation : '';
  const choices = q ? q.choices : ['','','',''];
  const ans = q ? q.answer_index : 0;
  document.getElementById('ansGroup').innerHTML = choices.map((c,i) => `
    <div class="ans-row">
      <input type="radio" name="ansRadio" class="ans-radio" value="${i}" ${i===ans?'checked':''} onchange="updateHighlight()">
      <input type="text" class="ans-input${i===ans?' selected':''}" id="c${i}" value="${c}" placeholder="選択肢${i+1}" oninput="updateHighlight()">
    </div>`).join('');
  document.getElementById('formArea').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function updateHighlight() {
  const sel = document.querySelector('input[name="ansRadio"]:checked');
  if (!sel) return;
  const idx = parseInt(sel.value);
  [0,1,2,3].forEach(i => { const el = document.getElementById('c'+i); if(el) el.className = 'ans-input'+(i===idx?' selected':''); });
}

function closeForm() { document.getElementById('formArea').style.display = 'none'; editingId = null; }

async function saveQuestion() {
  const question = document.getElementById('fQuestion').value.trim();
  const level = document.getElementById('fLevel').value;
  const explanation = document.getElementById('fExp').value.trim();
  const choices = [0,1,2,3].map(i => (document.getElementById('c'+i)||{value:''}).value.trim());
  const selRadio = document.querySelector('input[name="ansRadio"]:checked');
  const errEl = document.getElementById('formError');
  if (!question || choices.some(c=>!c) || !explanation) { errEl.innerHTML = '<div class="error-msg">全項目を入力してな</div>'; return; }
  if (!selRadio) { errEl.innerHTML = '<div class="error-msg">正解を選んでな</div>'; return; }
  const answer_index = parseInt(selRadio.value);
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    if (editingId) {
      await sbFetch(TABLE + '?id=eq.' + editingId, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({question,level,choices,answer_index,explanation}) });
      showToast('更新したで！');
    } else {
      await sbFetch(TABLE, { method:'POST', prefer:'return=minimal', body: JSON.stringify({question,level,choices,answer_index,explanation}) });
      showToast('追加したで！');
    }
    allQuestions = await sbFetch(TABLE + '?order=id.asc') || [];
    closeForm(); renderAdmin();
  } catch(e) {
    errEl.innerHTML = '<div class="error-msg">保存エラー：' + e.message + '</div>';
  } finally { btn.disabled = false; btn.textContent = '保存'; }
}

async function deleteQ(id) {
  if (!confirm('この問題を削除してええ？')) return;
  try {
    await sbFetch(TABLE + '?id=eq.' + id, { method:'DELETE' });
    allQuestions = allQuestions.filter(x => x.id !== id);
    renderAdmin(); showToast('削除したで');
  } catch(e) { showToast('削除エラー', '#ef4444'); }
}

function showToast(msg, bg='#22c55e') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = bg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
</body>
</html>
